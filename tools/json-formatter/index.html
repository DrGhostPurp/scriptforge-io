<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JSON Formatter & Beautifier — Free | ScriptForge</title><meta name="description" content="Format, validate and minify JSON instantly in your browser. Free, no login, works offline."><meta name="keywords" content="json formatter, json beautifier, format json online, json validator"><style>*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#0a0a0f;--sf:#13131a;--bd:#1e1e2e;--ac:#7c3aed;--a2:#06b6d4;--tx:#e2e8f0;--mu:#94a3b8;--gn:#10b981;--rd:#ef4444}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}nav{background:rgba(10,10,15,.95);border-bottom:1px solid var(--bd);padding:.75rem 5%}.ni{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}.logo{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}.nc{background:var(--ac);color:#fff;padding:.4rem 1rem;border-radius:7px;font-size:.85rem;font-weight:600;text-decoration:none}.hero{text-align:center;padding:2.5rem 5% 1.5rem}.hero h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;margin-bottom:.75rem}.hero h1 span{background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.hero p{color:var(--mu);max-width:550px;margin:0 auto}.tw{max-width:1100px;margin:0 auto;padding:1rem 5% 3rem}.ctrl{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}.btn{padding:.45rem 1rem;border-radius:7px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}.bp{background:var(--ac);color:#fff}.bp:hover{filter:brightness(1.1)}.ba{background:var(--a2);color:#fff}.ba:hover{filter:brightness(1.1)}.bg{background:var(--sf);color:var(--mu);border:1px solid var(--bd)}.bg:hover{color:var(--tx)}.br{background:rgba(239,68,68,.15);color:var(--rd);border:1px solid rgba(239,68,68,.3)}.eds{display:grid;grid-template-columns:1fr 1fr;gap:1rem}@media(max-width:700px){.eds{grid-template-columns:1fr}}.eb label{font-size:.8rem;color:var(--mu);display:block;margin-bottom:.4rem;font-weight:600}textarea{width:100%;height:380px;background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:.75rem;border-radius:8px;font-family:"Fira Code",Consolas,monospace;font-size:.82rem;line-height:1.55;resize:vertical;outline:none}textarea:focus{border-color:var(--ac)}.st{margin-top:.5rem;font-size:.82rem;min-height:1.2rem}.ok{color:var(--gn)}.er{color:var(--rd)}footer{background:var(--sf);border-top:1px solid var(--bd);padding:1.5rem 5%;text-align:center;color:var(--mu);font-size:.85rem;margin-top:3rem}footer a{color:var(--a2);text-decoration:none}</style></head><body>
<nav><div class="ni"><a href="https://drghostpurp.github.io/scriptforge-io/" class="logo">⚡ ScriptForge</a><a href="https://drghostpurp.github.io/scriptforge-app/" class="nc">Free IDE →</a></div></nav>
<div class="hero"><h1>JSON Formatter &amp; <span>Beautifier</span></h1><p>Paste JSON, click Format. Clean readable JSON instantly. 100% private — nothing sent to any server.</p></div>
<div class="tw">
<div class="ctrl">
<button class="btn bp" onclick="fmt()">✨ Format</button>
<button class="btn bg" onclick="min()">⬜ Minify</button>
<button class="btn ba" onclick="cp()">📋 Copy Output</button>
<button class="btn bg" onclick="sw()">⇄ Swap</button>
<button class="btn br" onclick="cl()">✕ Clear</button>
<select id="ind" class="btn bg"><option value="2">2 spaces</option><option value="4">4 spaces</option><option value="tab">Tab</option></select>
</div>
<div class="eds">
<div class="eb"><label>Input JSON</label><textarea id="inp" placeholder='Paste JSON here...

{"name":"ScriptForge","version":"0.5"}'></textarea></div>
<div class="eb"><label>Output <span id="bc" style="font-weight:400;color:var(--mu)"></span></label><textarea id="out" placeholder="Formatted JSON will appear here…" readonly></textarea></div>
</div>
<div class="st" id="st"></div>
</div>
<footer><p>© 2026 ScriptForge · <a href="https://drghostpurp.github.io/scriptforge-io/">Home</a> · <a href="https://drghostpurp.github.io/scriptforge-io/tools/">Tools</a> · <a href="https://drghostpurp.github.io/scriptforge-app/">IDE</a></p></footer>
<script>
function gi(id){return document.getElementById(id);}
function ind(){const v=gi("ind").value;return v==="tab"?"\t":parseInt(v);}
function ss(m,t){const el=gi("st");el.textContent=m;el.className="st "+(t||"");}
function fmt(){const i=gi("inp").value.trim();if(!i){ss("Paste some JSON first","er");return;}try{const o=JSON.stringify(JSON.parse(i),null,ind());gi("out").value=o;gi("bc").textContent="("+new Blob([o]).size.toLocaleString()+" bytes)";ss("✓ Valid JSON — formatted","ok");}catch(e){ss("✗ "+e.message,"er");}}
function min(){const i=gi("inp").value.trim();if(!i){ss("Paste some JSON first","er");return;}try{const o=JSON.stringify(JSON.parse(i));gi("out").value=o;gi("bc").textContent="("+new Blob([o]).size.toLocaleString()+" bytes)";ss("✓ Minified","ok");}catch(e){ss("✗ "+e.message,"er");}}
function cp(){const v=gi("out").value;if(!v){ss("Nothing to copy","er");return;}navigator.clipboard.writeText(v).then(()=>ss("✓ Copied","ok"));}
function sw(){const a=gi("inp").value;gi("inp").value=gi("out").value;gi("out").value=a;}
function cl(){gi("inp").value="";gi("out").value="";gi("st").textContent="";gi("bc").textContent="";}
gi("inp").addEventListener("input",()=>{try{JSON.parse(gi("inp").value);ss("✓ Valid JSON","ok");}catch(e){if(gi("inp").value.trim())ss("…"+e.message.substring(0,60),"er");else ss("");}});
</script></body></html>
