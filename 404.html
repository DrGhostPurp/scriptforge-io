<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 – Page Not Found | ScriptForge</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0d0d;color:#e5e7eb;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
  .code{font-size:7rem;font-weight:900;line-height:1;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
  h1{font-size:1.75rem;font-weight:700;color:#fff;margin-bottom:.75rem;text-align:center}
  p{color:#9ca3af;margin-bottom:2rem;text-align:center;max-width:400px;line-height:1.6}
  .links{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
  a.btn{background:#6366f1;color:#fff;padding:.65rem 1.5rem;border-radius:.5rem;text-decoration:none;font-weight:600;transition:background .2s}
  a.btn:hover{background:#4f46e5}
  a.ghost{background:transparent;border:1px solid #374151;color:#9ca3af;padding:.65rem 1.5rem;border-radius:.5rem;text-decoration:none;font-weight:600;transition:all .2s}
  a.ghost:hover{border-color:#6366f1;color:#fff}
  .logo{position:fixed;top:1.5rem;left:2rem;font-size:1.25rem;font-weight:700;color:#fff;text-decoration:none}
  .logo span{color:#6366f1}
</style>
</head>
<body>
<a class="logo" href="/scriptforge-io/"><Script<span>Forge</span></a>
<div class="code">404</div>
<h1>Page not found</h1>
<p>The page you're looking for doesn't exist or has been moved. Head back home or try one of these:</p>
<div class="links">
  <a href="/scriptforge-io/" class="btn">Go Home</a>
  <a href="/scriptforge-app/" class="ghost">Launch IDE</a>
  <a href="/scriptforge-io/tools/" class="ghost">Tools</a>
</div>
</body>
</html>
